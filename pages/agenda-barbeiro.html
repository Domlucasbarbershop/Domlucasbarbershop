<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda do Barbeiro | Barbearia App</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="app-page">
  <button id="sidebar-overlay" class="sidebar-overlay" type="button" aria-label="Fechar menu"></button>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-card">
        <span class="brand">Barbearia App</span>
        <nav class="nav">
          <a href="./dashboard.html" data-admin-only>Dashboard</a>
          <a href="./cadastro.html" data-admin-only>Cadastros</a>
          <a href="./agenda.html" data-admin-only>Agenda</a>
          <a href="./configuracoes.html" data-admin-only>Configuracoes gerais</a>
          <a href="./barbeiro.html">Painel Barbeiro</a>
          <a href="./agenda-barbeiro.html">Agenda do barbeiro</a>
          <a href="./financeiro-barbeiro.html">Financeiro barbeiro</a>
          <a href="./configuracoes-barbeiro.html">Meus horarios</a>
          <a href="./financeiro.html" data-admin-only>Financeiro</a>
        </nav>
        <div class="sidebar-user">
          <span data-user-name></span>
          <button data-logout class="btn-secondary">Sair</button>
        </div>
      </div>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div class="topbar-inner">
          <button id="btn-menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menu">&#9776;</button>
          <span class="brand">Barbearia App</span>
          <div>
            <span data-user-name></span>
            <button data-logout class="btn-secondary">Sair</button>
          </div>
        </div>
      </header>

      <main class="container">
        <h1>Agenda do Barbeiro</h1>
        <p id="agenda-barbeiro-info" class="muted"></p>

        <section class="card">
          <div class="rowBetween">
            <h3>Agendamentos</h3>
            <label>Data
              <input id="agenda-data-barbeiro" type="date" />
            </label>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Horario</th>
                  <th>Cliente</th>
                  <th>Servico</th>
                  <th>Status</th>
                  <th>Pagamento</th>
                </tr>
              </thead>
              <tbody id="lista-agenda-barbeiro"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/agendaBarbeiro.js"></script>
</body>
</html>
